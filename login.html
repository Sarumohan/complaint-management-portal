<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Complaint Management Portal | Login</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


    <link rel="stylesheet" href="login.css">

</head>

<body>

<div class="container">


    <div class="left-grid">

        <h1>
            Complaint
            <br>
            Management
            <br>
            Portal
        </h1>

        <div class="line"></div>

        <p>
            Your Voice. Our Priority.
        </p>

    </div>

    <div class="right-grid">

        <div class="login-card">

            <div class="user-icon">
                <i class="fa-regular fa-user"></i>
            </div>

            <h1>wassup</h1>

            <p>Login to continue to your account</p>

            <form action="#" method="post" autocomplete="off">

                <div class="input-box">

                    <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="Email Address"
                            autocomplete="off"
                            required>

                </div>

                <div class="input-box">

                    <input
                            type="password"
                            id="password"
                            name="new-password"
                            placeholder="Password"
                            autocomplete="new-password"
                            spellcheck="false"
                            autocorrect="off"
                            autocapitalize="off"
                            required>
                </div>

                <div class="options">

                    <label>

                        <input type="checkbox">

                        Remember Me

                    </label>

                    <a href="#">
                        Forgot Password?
                    </a>

                </div>

                <button type="submit" class="login-btn">

                    Login

                </button>

            </form>

            <div class="otherpart">

                <span>OR</span>

            </div>

            <div class="register">

                Don't have an account?

                <a href="register.html">

                    Register Now

                </a>

            </div>

            <div class="home">

                <a href="home.html">

                    Back to Home

                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
